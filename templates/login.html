<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — BG Remover</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource-variable/inter@5.2.5/wght.min.css"/>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --danger: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --radius: 14px;
  }
  html { color-scheme: dark; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Inter Variable", Inter, ui-sans-serif, system-ui, -apple-system,
      "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Card ── */
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 24px 48px #0006;
  }

  /* ── Logo / header ── */
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 22px; height: 22px; color: #fff; }
  .logo-text h1 { font-size: 1.1rem; font-weight: 700; }
  .logo-text p  { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

  /* ── Form ── */
  .field { margin-bottom: 18px; }
  label  { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 7px; font-weight: 500; }
  .input-wrap { position: relative; }
  input[type=text], input[type=password] {
    width: 100%;
    padding: 11px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    font-family: inherit;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px #6c63ff22;
  }
  input.invalid { border-color: var(--danger); }

  /* Toggle password visibility */
  .eye-btn {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); padding: 4px;
    display: flex; align-items: center;
    transition: color .15s;
  }
  .eye-btn:hover { color: var(--accent2); }
  .eye-btn svg { width: 18px; height: 18px; pointer-events: none; }

  /* ── Submit button ── */
  .btn-login {
    width: 100%; padding: 12px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 9px;
    font-size: 0.92rem; font-weight: 600;
    cursor: pointer; margin-top: 6px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background .15s, transform .1s;
    font-family: inherit;
  }
  .btn-login:hover  { background: #5a52e0; }
  .btn-login:active { transform: scale(.98); }
  .btn-login:disabled { opacity: .55; cursor: not-allowed; transform: none; }

  /* ── Spinner ── */
  .spinner {
    width: 17px; height: 17px;
    border: 2px solid #ffffff55;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    display: none;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error alert ── */
  .alert {
    padding: 11px 14px;
    border-radius: 8px;
    font-size: 0.83rem;
    margin-top: 16px;
    display: none;
    border: 1px solid var(--danger);
    background: #7f1d1d44;
    color: #fca5a5;
  }
  .alert.show { display: flex; align-items: flex-start; gap: 8px; }
  .alert svg  { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

  /* ── Footer note ── */
  .footer-note {
    margin-top: 24px;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .login-card { padding: 28px 20px; }
  }
</style>
</head>
<body>

<div class="login-card" role="main">
  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon" aria-hidden="true">
      <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24">
        <path d="M12 3v4M12 17v4M5.64 5.64l2.83 2.83m7.07 7.07 2.83 2.83M3 12h4m14 0h4M5.64 18.36l2.83-2.83m7.07-7.07 2.83-2.83"/>
      </svg>
    </div>
    <div class="logo-text">
      <h1>BG Remover</h1>
      <p>Admin Dashboard</p>
    </div>
  </div>

  <!-- Form -->
  <form id="login-form" novalidate onsubmit="return false;">
    <div class="field">
      <label for="username">Username</label>
      <input
        type="text"
        id="username"
        name="username"
        placeholder="Enter admin username"
        autocomplete="username"
        autofocus
        required
      />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        />
        <button type="button" class="eye-btn" id="toggle-pw" aria-label="Toggle password visibility" onclick="togglePassword()">
          <!-- eye icon (default: show) -->
          <svg id="eye-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="submit-btn" onclick="doLogin()">
      <div class="spinner" id="spinner" aria-hidden="true"></div>
      Sign In
    </button>
  </form>

  <!-- Error alert -->
  <div class="alert" id="error-alert" role="alert" aria-live="polite">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
    </svg>
    <span id="error-msg">Invalid username or password.</span>
  </div>

  <!-- Footer -->
  <p class="footer-note">Credentials are managed in the server <code>.env</code> file.</p>
</div>

<script>
  // Enter key submits the form
  document.getElementById('login-form').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  function togglePassword() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eye-icon');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    // Swap icon: open-eye vs eye-slash
    icon.innerHTML = isHidden
      ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
         <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
         <line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
         <circle cx="12" cy="12" r="3"/>`;
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    // Client-side validation
    const userInput = document.getElementById('username');
    const pwInput   = document.getElementById('password');

    userInput.classList.remove('invalid');
    pwInput.classList.remove('invalid');
    hideError();

    if (!username) { userInput.classList.add('invalid'); showError('Username is required.'); return; }
    if (!password) { pwInput.classList.add('invalid');   showError('Password is required.'); return; }

    setLoading(true);

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json().catch(() => ({}));

      if (res.ok) {
        // Redirect to dashboard — cookie is already set by the server
        window.location.replace('/');
      } else {
        showError(data.detail || 'Invalid username or password.');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    } catch (err) {
      showError('Connection error: ' + err.message);
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on) {
    const btn = document.getElementById('submit-btn');
    const spinner = document.getElementById('spinner');
    btn.disabled = on;
    spinner.style.display = on ? 'block' : 'none';
  }

  function showError(msg) {
    const alert = document.getElementById('error-alert');
    document.getElementById('error-msg').textContent = msg;
    alert.classList.add('show');
  }

  function hideError() {
    document.getElementById('error-alert').classList.remove('show');
  }
</script>
</body>
</html>
